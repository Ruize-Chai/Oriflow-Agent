<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="register-shell">
        <div class="register-title">Oriflow Agent</div>
        <div class="register-fields">
            <input class="register-input" type="text" placeholder="username" autocomplete="username">
            <input class="register-input" type="password" placeholder="password" autocomplete="new-password">
            <input class="register-input" type="password" placeholder="confirm your password" autocomplete="new-password">
        </div>
        <div class="register-actions">
            <button class="register-button" type="button">Confirm</button>
        </div>
    </main>
</body>

<style>
    :root {
        --bg-light: #3c424a;
        --bg-mid: #22272e;
        --bg-dark: #0f1216;
        --glass: rgba(255, 255, 255, 0.18);
    }

    body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, var(--bg-light), var(--bg-mid), var(--bg-dark));
        color: #1e1f24;
        position: relative;
        overflow: hidden;
        display: grid;
        place-items: center;
    }

    .register-shell {
        width: min(70vw, 520px);
        aspect-ratio: 0.618;
        background: #ffffff;
        border-radius: 5px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-rows: auto auto 1fr auto 1fr;
        justify-items: center;
        padding: 32px 0 24px;
        box-sizing: border-box;
    }

    .register-title {
        font-family: "Nunito", "Segoe UI", "PingFang SC", sans-serif;
        font-size: 35px;
        letter-spacing: 0.6px;
        color: #1a1d22;
        user-select: none;
    }

    .register-fields {
        width: min(86%, 420px);
        margin-top: 28px;
        display: flex;
        flex-direction: column;
        gap: 58px;
    }

    .register-actions {
        grid-row: 4;
        width: 100%;
        display: flex;
        justify-content: center;
    }

    .register-button {
        width: min(60%, 240px);
        height: 44px;
        border: none;
        border-radius: 5px;
        background: #0c0c0f;
        color: #ffffff;
        font-size: 17px;
        letter-spacing: 0.4px;
        cursor: pointer;
    }

    .register-button:hover {
        background: #11131a;
    }

    .register-input {
        height: 44px;
        padding: 0 14px;
        border-radius: 5px;
        border: 1px solid #d9dde3;
        background: #ffffff;
        font-size: 14px;
        color: #1a1d22;
        outline: none;
    }

    .register-input::placeholder {
        color: #8a919b;
    }

    .register-input:focus {
        border-color: #4b5563;
        box-shadow: 0 0 0 2px rgba(75, 85, 99, 0.15);
    }

    body::before {
        content: "";
        position: fixed;
        inset: -10% 0 0 -10%;
        background: radial-gradient(40% 35% at 50% 45%, rgba(255, 255, 255, 0.22), transparent 60%),
            radial-gradient(60% 50% at 20% 20%, rgba(255, 255, 255, 0.28), transparent 60%),
            radial-gradient(50% 40% at 80% 10%, rgba(255, 255, 255, 0.18), transparent 65%),
            radial-gradient(55% 45% at 70% 80%, rgba(255, 255, 255, 0.12), transparent 70%);
        filter: blur(18px);
        opacity: 0.8;
        pointer-events: none;
        z-index: 0;
    }

    body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: var(--glass);
        backdrop-filter: blur(14px) saturate(120%);
        -webkit-backdrop-filter: blur(14px) saturate(120%);
        pointer-events: none;
        z-index: 0;
    }
</style>
</html>
